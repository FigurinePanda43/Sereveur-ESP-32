services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: esp32-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/devices.db
      - CADDY_ADMIN_URL=http://caddy:2019
    volumes:
      - db_data:/data
      - ./frontend:/app/frontend:ro
    depends_on:
      - caddy
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: esp32-caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: esp32-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - internal

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
