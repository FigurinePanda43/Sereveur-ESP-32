<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">⚡</span>
        <span class="header-title">ESP32 Manager</span>
      </div>
      <button class="btn btn-primary" id="btn-add">+ Ajouter un équipement</button>
    </div>
  </header>

  <main class="main">
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-online" id="stat-online">—</span>
        <span class="stat-label">En ligne</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-slow" id="stat-slow">—</span>
        <span class="stat-label">Lents</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-offline" id="stat-offline">—</span>
        <span class="stat-label">Hors ligne</span>
      </div>
    </div>

    <div class="device-grid" id="device-grid">
      <div class="empty-state" id="empty-state" hidden>
        <p>Aucun équipement enregistré.</p>
        <button class="btn btn-primary" id="btn-add-empty">Ajouter le premier équipement</button>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Ajouter un équipement</h2>
        <button class="modal-close" id="modal-close" aria-label="Fermer">&times;</button>
      </div>
      <form id="device-form" novalidate>
        <input type="hidden" id="field-id">
        <div class="form-group">
          <label for="field-name">Nom du projet <span class="required">*</span></label>
          <input type="text" id="field-name" placeholder="ex : Cuve GO Marseille" maxlength="100" required>
        </div>
        <div class="form-group">
          <label for="field-slug">Sous-domaine <span class="required">*</span></label>
          <input type="text" id="field-slug" placeholder="ex : cuve-go" pattern="^[a-z0-9-]+$" maxlength="63" required>
          <span class="field-hint" id="slug-preview"></span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="field-ip">IP locale <span class="required">*</span></label>
            <input type="text" id="field-ip" placeholder="192.168.1.45" required>
          </div>
          <div class="form-group form-group-sm">
            <label for="field-port">Port <span class="required">*</span></label>
            <input type="number" id="field-port" value="80" min="1" max="65535" required>
          </div>
        </div>
        <div class="form-group">
          <label for="field-desc">Description</label>
          <input type="text" id="field-desc" placeholder="Description optionnelle" maxlength="500">
        </div>
        <div class="form-error" id="form-error" hidden></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Annuler</button>
          <button type="submit" class="btn btn-primary" id="btn-submit">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete -->
  <div class="modal-backdrop" id="confirm-backdrop" hidden>
    <div class="modal modal-sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">Confirmer la suppression</h2>
      </div>
      <p id="confirm-text" class="confirm-text"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="confirm-cancel">Annuler</button>
        <button type="button" class="btn btn-danger" id="confirm-ok">Supprimer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="/js/app.js"></script>
</body>
</html>
